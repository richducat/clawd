name: Markdown Audit

on:
  pull_request:
    paths:
      - "**/*.md"
      - "scripts/maintenance/markdown-audit.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/markdown-audit.yml"
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - "scripts/maintenance/markdown-audit.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/markdown-audit.yml"
  schedule:
    - cron: "15 13 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Run markdown audit (strict)
        run: npm run md:audit:strict
