name: Hybrid Daily Pipeline

on:
  workflow_dispatch:
    inputs:
      account:
        description: "Account email used for self-filtering in ingest/meeting prep"
        required: false
        default: "richducat@gmail.com"
      date:
        description: "Target date for meeting prep (YYYY-MM-DD). Leave blank for today's date in ET."
        required: false
        default: ""
      use_fixtures:
        description: "Use repo fixture data for Gmail/Calendar/KB steps"
        required: true
        type: boolean
        default: true
      live_mode:
        description: "Run live-source mode on self-hosted runner (forces fixtures OFF + connector preflight)"
        required: true
        type: boolean
        default: false
      break_glass:
        description: "Override live emergency stop (requires reason)"
        required: true
        type: boolean
        default: false
      break_glass_reason:
        description: "Required when break_glass=true; appears in live run audit logs"
        required: false
        default: ""
      skip_kb:
        description: "Skip KB ingestion step"
        required: true
        type: boolean
        default: false
      max_lag_hours:
        description: "Health gate: max ingestion lag hours before breach"
        required: false
        default: "24"
      max_seen_drift_hours:
        description: "Health gate: max seen drift hours before breach"
        required: false
        default: "48"
      max_artifact_issues:
        description: "Health gate: max artifact-derived issue count before breach"
        required: false
        default: "0"
      max_drift_signals:
        description: "Optional drift gate in live mode: fail when canary-vs-live drift signals exceed this count"
        required: false
        default: ""
  schedule:
    - cron: "20 13 * * *"

permissions:
  contents: read
  actions: read

concurrency:
  group: hybrid-daily-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-daily-canary:
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && !inputs.live_mode) }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: America/New_York
      OPENCLAW_DB_ROOT: ${{ github.workspace }}/.tmp/openclaw-db
      ACCOUNT_INPUT: ${{ inputs.account || 'richducat@gmail.com' }}
      DATE_INPUT: ${{ inputs.date || '' }}
      USE_FIXTURES_INPUT: ${{ inputs.use_fixtures }}
      SKIP_KB_INPUT: ${{ inputs.skip_kb }}
      MAX_LAG_HOURS_INPUT: ${{ inputs.max_lag_hours || '24' }}
      MAX_SEEN_DRIFT_HOURS_INPUT: ${{ inputs.max_seen_drift_hours || '48' }}
      MAX_ARTIFACT_ISSUES_INPUT: ${{ inputs.max_artifact_issues || '0' }}
      MAX_DRIFT_SIGNALS_INPUT: ${{ inputs.max_drift_signals || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build run args
        id: args
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts

          run_date="${DATE_INPUT}"
          if [[ -z "$run_date" ]]; then
            run_date="$(date +%F)"
          fi

          account="${ACCOUNT_INPUT}"
          args=(--account "$account" --date "$run_date" --brief-out "artifacts/meeting-prep-${run_date}.md")

          use_fixtures="${USE_FIXTURES_INPUT:-true}"
          if [[ "$use_fixtures" == "true" ]]; then
            args+=(
              --gmail-json scripts/db/fixtures/gmail-sample.json
              --calendar-json scripts/db/fixtures/calendar-sample.json
            )
            if [[ "${SKIP_KB_INPUT:-false}" != "true" ]]; then
              args+=(--kb-from-file scripts/db/fixtures/kb-sources-sample.json)
            fi
          fi

          if [[ "${SKIP_KB_INPUT:-false}" == "true" ]]; then
            args+=(--skip-kb)
          fi

          {
            echo "run_date=$run_date"
            echo "account=$account"
            printf 'args<<EOF\n'
            printf '%q ' "${args[@]}"
            printf '\nEOF\n'
          } >> "$GITHUB_OUTPUT"

      - name: Run daily hybrid pipeline
        shell: bash
        run: |
          set -euo pipefail
          eval "set -- ${{ steps.args.outputs.args }}"
          npm run db:hybrid:daily -- "$@" | tee "artifacts/pipeline-summary-${{ steps.args.outputs.run_date }}.json"

      - name: Run ingestion health threshold gate
        shell: bash
        run: |
          set -euo pipefail
          run_date="${{ steps.args.outputs.run_date }}"

          npm run db:hybrid:health -- \
            --artifact-dir artifacts \
            > "artifacts/ingestion-health-${run_date}.md"

          npm run db:hybrid:health -- \
            --json \
            --artifact-dir artifacts \
            --trend-artifact-dir artifacts \
            --trend-artifact-prefix ingestion-trends \
            --trend-retention-count 180 \
            --max-lag-hours "${MAX_LAG_HOURS_INPUT}" \
            --max-seen-drift-hours "${MAX_SEEN_DRIFT_HOURS_INPUT}" \
            --max-artifact-issues "${MAX_ARTIFACT_ISSUES_INPUT}" \
            | tee "artifacts/ingestion-health-${run_date}.json"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hybrid-daily-canary-${{ steps.args.outputs.run_date }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 14

      - name: Dispatch health-gate alerts
        if: ${{ failure() }}
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.HYBRID_ALERT_WEBHOOK_URL }}
          ALERT_WEBHOOK_URLS: ${{ secrets.HYBRID_ALERT_WEBHOOK_URLS }}
          ALERT_ESCALATION_WEBHOOK_URL: ${{ secrets.HYBRID_ALERT_ESCALATION_WEBHOOK_URL }}
          ALERT_ESCALATION_WEBHOOK_URLS: ${{ secrets.HYBRID_ALERT_ESCALATION_WEBHOOK_URLS }}
          ALERT_ESCALATION_WINDOWS_ET: ${{ vars.HYBRID_ALERT_ESCALATION_WINDOWS_ET || 'always' }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
          BRANCH_REF: ${{ github.ref_name }}
          RUN_DATE: ${{ steps.args.outputs.run_date }}
          RUN_MODE: canary
          ARTIFACT_LABEL: hybrid-daily-canary-${{ steps.args.outputs.run_date }}
          MAX_LAG_HOURS: ${{ env.MAX_LAG_HOURS_INPUT }}
          MAX_SEEN_DRIFT_HOURS: ${{ env.MAX_SEEN_DRIFT_HOURS_INPUT }}
          MAX_ARTIFACT_ISSUES: ${{ env.MAX_ARTIFACT_ISSUES_INPUT }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/ci/dispatch-hybrid-alert.mjs

  run-daily-live:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.live_mode }}
    runs-on:
      - self-hosted
    environment:
      name: hybrid-live
    timeout-minutes: 30
    env:
      TZ: America/New_York
      OPENCLAW_DB_ROOT: ${{ github.workspace }}/.tmp/openclaw-db
      ACCOUNT_INPUT: ${{ inputs.account || 'richducat@gmail.com' }}
      DATE_INPUT: ${{ inputs.date || '' }}
      USE_FIXTURES_INPUT: ${{ inputs.use_fixtures }}
      SKIP_KB_INPUT: ${{ inputs.skip_kb }}
      MAX_LAG_HOURS_INPUT: ${{ inputs.max_lag_hours || '24' }}
      MAX_SEEN_DRIFT_HOURS_INPUT: ${{ inputs.max_seen_drift_hours || '48' }}
      MAX_ARTIFACT_ISSUES_INPUT: ${{ inputs.max_artifact_issues || '0' }}
      MAX_DRIFT_SIGNALS_INPUT: ${{ inputs.max_drift_signals || '' }}
      LIVE_ALLOWED_ACTORS_INPUT: ${{ vars.HYBRID_LIVE_ALLOWED_ACTORS || 'richducat' }}
      LIVE_EMERGENCY_STOP_INPUT: ${{ vars.HYBRID_LIVE_EMERGENCY_STOP || 'false' }}
      LIVE_APPROVAL_ENVIRONMENT: hybrid-live
      BREAK_GLASS_INPUT: ${{ inputs.break_glass }}
      BREAK_GLASS_REASON_INPUT: ${{ inputs.break_glass_reason || '' }}
      TRIGGER_ACTOR: ${{ github.triggering_actor || github.actor }}
      BRANCH_NAME: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Enforce live governance policy
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$BRANCH_NAME" != "main" ]]; then
            echo "live_mode is restricted to main branch dispatches (current branch: $BRANCH_NAME)"
            exit 1
          fi

          if [[ "${USE_FIXTURES_INPUT:-false}" == "true" ]]; then
            echo "live_mode requires use_fixtures=false."
            exit 1
          fi

          allowed_csv="${LIVE_ALLOWED_ACTORS_INPUT}"
          actor="$TRIGGER_ACTOR"

          normalized="$(printf '%s' "$allowed_csv" | tr ',' '\n' | tr -d ' ' | sed '/^$/d')"
          if [[ -z "$normalized" ]]; then
            echo "HYBRID_LIVE_ALLOWED_ACTORS resolved to empty. Configure at least one allowed actor."
            exit 1
          fi

          if ! printf '%s\n' "$normalized" | grep -Fxq "$actor"; then
            echo "actor $actor is not authorized for live_mode. Allowed actors: $normalized"
            exit 1
          fi

          stop_flag="$(printf '%s' "${LIVE_EMERGENCY_STOP_INPUT:-false}" | tr '[:upper:]' '[:lower:]')"
          break_glass_flag="$(printf '%s' "${BREAK_GLASS_INPUT:-false}" | tr '[:upper:]' '[:lower:]')"
          reason="$(printf '%s' "${BREAK_GLASS_REASON_INPUT:-}" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"

          if [[ "$break_glass_flag" == "true" && -z "$reason" ]]; then
            echo "break_glass=true requires a non-empty break_glass_reason."
            exit 1
          fi

          if [[ "$stop_flag" == "true" && "$break_glass_flag" != "true" ]]; then
            echo "HYBRID_LIVE_EMERGENCY_STOP=true blocks live_mode runs unless break_glass=true with reason."
            exit 1
          fi

      - name: Build run args
        id: args
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts

          run_date="${DATE_INPUT}"
          if [[ -z "$run_date" ]]; then
            run_date="$(date +%F)"
          fi

          account="${ACCOUNT_INPUT}"
          args=(--account "$account" --date "$run_date" --brief-out "artifacts/meeting-prep-${run_date}.md")

          if [[ "${SKIP_KB_INPUT:-false}" == "true" ]]; then
            args+=(--skip-kb)
          fi

          {
            echo "run_date=$run_date"
            echo "account=$account"
            printf 'args<<EOF\n'
            printf '%q ' "${args[@]}"
            printf '\nEOF\n'
          } >> "$GITHUB_OUTPUT"

      - name: Export immutable live incident ledger
        id: ledger
        shell: bash
        env:
          RUN_DATE: ${{ steps.args.outputs.run_date }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          node scripts/ci/export-live-incident-ledger.mjs --out-dir artifacts

      - name: Emit live audit context
        shell: bash
        run: |
          set -euo pipefail
          break_glass_flag="$(printf '%s' "${BREAK_GLASS_INPUT:-false}" | tr '[:upper:]' '[:lower:]')"
          reason="$(printf '%s' "${BREAK_GLASS_REASON_INPUT:-}" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"

          if [[ "$break_glass_flag" == "true" ]]; then
            echo "LIVE_AUDIT actor=$TRIGGER_ACTOR emergency_stop=${LIVE_EMERGENCY_STOP_INPUT:-false} break_glass=true reason=\"$reason\""
          else
            echo "LIVE_AUDIT actor=$TRIGGER_ACTOR emergency_stop=${LIVE_EMERGENCY_STOP_INPUT:-false} break_glass=false"
          fi

      - name: Preflight live connector checks
        shell: bash
        run: |
          set -euo pipefail

          if ! command -v gog >/dev/null 2>&1; then
            echo "Missing required connector CLI: gog"
            exit 1
          fi

          read -r from_iso to_iso < <(node -e '
            const now = new Date();
            const from = new Date(now.getTime() - 24 * 60 * 60 * 1000);
            process.stdout.write(`${from.toISOString()} ${now.toISOString()}`);
          ')

          gog gmail messages search "newer_than:7d" --max 1 --account "${ACCOUNT_INPUT}" --json > /dev/null
          gog calendar events primary --from "${from_iso}" --to "${to_iso}" --account "${ACCOUNT_INPUT}" --json > /dev/null

      - name: Run daily hybrid pipeline
        shell: bash
        run: |
          set -euo pipefail
          eval "set -- ${{ steps.args.outputs.args }}"
          npm run db:hybrid:daily -- "$@" | tee "artifacts/pipeline-summary-${{ steps.args.outputs.run_date }}.json"

      - name: Run ingestion health threshold gate
        shell: bash
        run: |
          set -euo pipefail
          run_date="${{ steps.args.outputs.run_date }}"

          npm run db:hybrid:health -- \
            --artifact-dir artifacts \
            > "artifacts/ingestion-health-${run_date}.md"

          npm run db:hybrid:health -- \
            --json \
            --artifact-dir artifacts \
            --trend-artifact-dir artifacts \
            --trend-artifact-prefix ingestion-trends \
            --trend-retention-count 180 \
            --max-lag-hours "${MAX_LAG_HOURS_INPUT}" \
            --max-seen-drift-hours "${MAX_SEEN_DRIFT_HOURS_INPUT}" \
            --max-artifact-issues "${MAX_ARTIFACT_ISSUES_INPUT}" \
            | tee "artifacts/ingestion-health-${run_date}.json"

      - name: Resolve same-date canary artifact baseline
        id: canary
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_DATE: ${{ steps.args.outputs.run_date }}
        shell: bash
        run: |
          set -euo pipefail

          artifact_name="hybrid-daily-canary-${RUN_DATE}"
          api="https://api.github.com/repos/${REPO}/actions/artifacts?name=${artifact_name}&per_page=100"
          response="$(curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "$api")"

          artifact_id="$(printf '%s' "$response" | node -e '
            const fs = require("node:fs");
            const data = JSON.parse(fs.readFileSync(0, "utf8"));
            const artifacts = Array.isArray(data.artifacts) ? data.artifacts : [];
            const active = artifacts
              .filter((artifact) => !artifact.expired)
              .sort((a, b) => String(b.created_at || "").localeCompare(String(a.created_at || "")));
            process.stdout.write(active[0] ? String(active[0].id) : "");
          ')"

          if [[ -z "$artifact_id" ]]; then
            echo "Canary baseline artifact ${artifact_name} not found. Drift check will run in baseline_unavailable mode."
          else
            echo "Resolved canary baseline artifact id=${artifact_id} name=${artifact_name}"
          fi

          echo "artifact_id=${artifact_id}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${artifact_name}" >> "$GITHUB_OUTPUT"

      - name: Download canary artifact baseline
        if: ${{ steps.canary.outputs.artifact_id != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ARTIFACT_ID: ${{ steps.canary.outputs.artifact_id }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/canary-baseline
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/actions/artifacts/${ARTIFACT_ID}/zip" \
            -o artifacts/canary-baseline.zip
          unzip -oq artifacts/canary-baseline.zip -d artifacts/canary-baseline

      - name: Compare canary-vs-live health drift
        id: drift
        shell: bash
        run: |
          set -euo pipefail
          run_date="${{ steps.args.outputs.run_date }}"
          live_json="artifacts/ingestion-health-${run_date}.json"
          canary_json="artifacts/canary-baseline/ingestion-health-${run_date}.json"

          cmd=(
            node scripts/ci/compare-canary-live-health.mjs
            --run-date "$run_date"
            --live-json "$live_json"
            --out-dir artifacts
          )

          if [[ -f "$canary_json" ]]; then
            cmd+=(--canary-json "$canary_json")
          fi

          if [[ -n "${MAX_DRIFT_SIGNALS_INPUT:-}" ]]; then
            cmd+=(--max-drift-signals "${MAX_DRIFT_SIGNALS_INPUT}")
          fi

          "${cmd[@]}"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hybrid-daily-live-${{ steps.args.outputs.run_date }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 14

      - name: Dispatch health-gate alerts
        if: ${{ failure() }}
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.HYBRID_ALERT_WEBHOOK_URL }}
          ALERT_WEBHOOK_URLS: ${{ secrets.HYBRID_ALERT_WEBHOOK_URLS }}
          ALERT_ESCALATION_WEBHOOK_URL: ${{ secrets.HYBRID_ALERT_ESCALATION_WEBHOOK_URL }}
          ALERT_ESCALATION_WEBHOOK_URLS: ${{ secrets.HYBRID_ALERT_ESCALATION_WEBHOOK_URLS }}
          ALERT_ESCALATION_WINDOWS_ET: ${{ vars.HYBRID_ALERT_ESCALATION_WINDOWS_ET || 'always' }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
          BRANCH_REF: ${{ github.ref_name }}
          RUN_DATE: ${{ steps.args.outputs.run_date }}
          RUN_MODE: live
          ARTIFACT_LABEL: hybrid-daily-live-${{ steps.args.outputs.run_date }}
          MAX_LAG_HOURS: ${{ env.MAX_LAG_HOURS_INPUT }}
          MAX_SEEN_DRIFT_HOURS: ${{ env.MAX_SEEN_DRIFT_HOURS_INPUT }}
          MAX_ARTIFACT_ISSUES: ${{ env.MAX_ARTIFACT_ISSUES_INPUT }}
          ALERT_APPROVAL_REQUIRED: "true"
          ALERT_APPROVAL_ENVIRONMENT: ${{ env.LIVE_APPROVAL_ENVIRONMENT }}
          ALERT_APPROVAL_TRIGGER_ACTOR: ${{ env.TRIGGER_ACTOR }}
          ALERT_APPROVAL_DISPATCH_ACTOR: ${{ github.actor }}
          ALERT_BREAK_GLASS: ${{ env.BREAK_GLASS_INPUT }}
          ALERT_BREAK_GLASS_REASON: ${{ env.BREAK_GLASS_REASON_INPUT }}
          ALERT_EMERGENCY_STOP: ${{ env.LIVE_EMERGENCY_STOP_INPUT }}
          ALERT_INCIDENT_LEDGER_JSON: ${{ steps.ledger.outputs.ledger_json_path }}
          ALERT_INCIDENT_LEDGER_MD: ${{ steps.ledger.outputs.ledger_md_path }}
          ALERT_DRIFT_STATUS: ${{ steps.drift.outputs.drift_status }}
          ALERT_DRIFT_SIGNAL_COUNT: ${{ steps.drift.outputs.drift_signal_count }}
          ALERT_DRIFT_GATE_BREACHED: ${{ steps.drift.outputs.drift_gate_breached }}
          ALERT_DRIFT_JSON: ${{ steps.drift.outputs.drift_json_path }}
          ALERT_DRIFT_MD: ${{ steps.drift.outputs.drift_md_path }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/ci/dispatch-hybrid-alert.mjs
