name: Hybrid Daily Pipeline

on:
  workflow_dispatch:
    inputs:
      account:
        description: "Account email used for self-filtering in ingest/meeting prep"
        required: false
        default: "richducat@gmail.com"
      date:
        description: "Target date for meeting prep (YYYY-MM-DD). Leave blank for today's date in ET."
        required: false
        default: ""
      use_fixtures:
        description: "Use repo fixture data for Gmail/Calendar/KB steps"
        required: true
        type: boolean
        default: true
      live_mode:
        description: "Run live-source mode on self-hosted runner (forces fixtures OFF + connector preflight)"
        required: true
        type: boolean
        default: false
      skip_kb:
        description: "Skip KB ingestion step"
        required: true
        type: boolean
        default: false
      max_lag_hours:
        description: "Health gate: max ingestion lag hours before breach"
        required: false
        default: "24"
      max_seen_drift_hours:
        description: "Health gate: max seen drift hours before breach"
        required: false
        default: "48"
      max_artifact_issues:
        description: "Health gate: max artifact-derived issue count before breach"
        required: false
        default: "0"
  schedule:
    - cron: "20 13 * * *"

permissions:
  contents: read

concurrency:
  group: hybrid-daily-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-daily-canary:
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && !inputs.live_mode) }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: America/New_York
      OPENCLAW_DB_ROOT: ${{ github.workspace }}/.tmp/openclaw-db
      ACCOUNT_INPUT: ${{ inputs.account || 'richducat@gmail.com' }}
      DATE_INPUT: ${{ inputs.date || '' }}
      USE_FIXTURES_INPUT: ${{ inputs.use_fixtures }}
      SKIP_KB_INPUT: ${{ inputs.skip_kb }}
      MAX_LAG_HOURS_INPUT: ${{ inputs.max_lag_hours || '24' }}
      MAX_SEEN_DRIFT_HOURS_INPUT: ${{ inputs.max_seen_drift_hours || '48' }}
      MAX_ARTIFACT_ISSUES_INPUT: ${{ inputs.max_artifact_issues || '0' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build run args
        id: args
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts

          run_date="${DATE_INPUT}"
          if [[ -z "$run_date" ]]; then
            run_date="$(date +%F)"
          fi

          account="${ACCOUNT_INPUT}"
          args=(--account "$account" --date "$run_date" --brief-out "artifacts/meeting-prep-${run_date}.md")

          use_fixtures="${USE_FIXTURES_INPUT:-true}"
          if [[ "$use_fixtures" == "true" ]]; then
            args+=(
              --gmail-json scripts/db/fixtures/gmail-sample.json
              --calendar-json scripts/db/fixtures/calendar-sample.json
            )
            if [[ "${SKIP_KB_INPUT:-false}" != "true" ]]; then
              args+=(--kb-from-file scripts/db/fixtures/kb-sources-sample.json)
            fi
          fi

          if [[ "${SKIP_KB_INPUT:-false}" == "true" ]]; then
            args+=(--skip-kb)
          fi

          {
            echo "run_date=$run_date"
            echo "account=$account"
            printf 'args<<EOF\n'
            printf '%q ' "${args[@]}"
            printf '\nEOF\n'
          } >> "$GITHUB_OUTPUT"

      - name: Run daily hybrid pipeline
        shell: bash
        run: |
          set -euo pipefail
          eval "set -- ${{ steps.args.outputs.args }}"
          npm run db:hybrid:daily -- "$@" | tee "artifacts/pipeline-summary-${{ steps.args.outputs.run_date }}.json"

      - name: Run ingestion health threshold gate
        shell: bash
        run: |
          set -euo pipefail
          run_date="${{ steps.args.outputs.run_date }}"

          npm run db:hybrid:health -- \
            --artifact-dir artifacts \
            > "artifacts/ingestion-health-${run_date}.md"

          npm run db:hybrid:health -- \
            --json \
            --artifact-dir artifacts \
            --max-lag-hours "${MAX_LAG_HOURS_INPUT}" \
            --max-seen-drift-hours "${MAX_SEEN_DRIFT_HOURS_INPUT}" \
            --max-artifact-issues "${MAX_ARTIFACT_ISSUES_INPUT}" \
            | tee "artifacts/ingestion-health-${run_date}.json"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hybrid-daily-canary-${{ steps.args.outputs.run_date }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 14

      - name: Dispatch health-gate alerts
        if: ${{ failure() }}
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.HYBRID_ALERT_WEBHOOK_URL }}
          ALERT_WEBHOOK_URLS: ${{ secrets.HYBRID_ALERT_WEBHOOK_URLS }}
          ALERT_ESCALATION_WEBHOOK_URL: ${{ secrets.HYBRID_ALERT_ESCALATION_WEBHOOK_URL }}
          ALERT_ESCALATION_WEBHOOK_URLS: ${{ secrets.HYBRID_ALERT_ESCALATION_WEBHOOK_URLS }}
          ALERT_ESCALATION_WINDOWS_ET: ${{ vars.HYBRID_ALERT_ESCALATION_WINDOWS_ET || 'always' }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
          BRANCH_REF: ${{ github.ref_name }}
          RUN_DATE: ${{ steps.args.outputs.run_date }}
          RUN_MODE: canary
          ARTIFACT_LABEL: hybrid-daily-canary-${{ steps.args.outputs.run_date }}
          MAX_LAG_HOURS: ${{ env.MAX_LAG_HOURS_INPUT }}
          MAX_SEEN_DRIFT_HOURS: ${{ env.MAX_SEEN_DRIFT_HOURS_INPUT }}
          MAX_ARTIFACT_ISSUES: ${{ env.MAX_ARTIFACT_ISSUES_INPUT }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/ci/dispatch-hybrid-alert.mjs

  run-daily-live:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.live_mode }}
    runs-on:
      - self-hosted
    environment:
      name: hybrid-live
    timeout-minutes: 30
    env:
      TZ: America/New_York
      OPENCLAW_DB_ROOT: ${{ github.workspace }}/.tmp/openclaw-db
      ACCOUNT_INPUT: ${{ inputs.account || 'richducat@gmail.com' }}
      DATE_INPUT: ${{ inputs.date || '' }}
      USE_FIXTURES_INPUT: ${{ inputs.use_fixtures }}
      SKIP_KB_INPUT: ${{ inputs.skip_kb }}
      MAX_LAG_HOURS_INPUT: ${{ inputs.max_lag_hours || '24' }}
      MAX_SEEN_DRIFT_HOURS_INPUT: ${{ inputs.max_seen_drift_hours || '48' }}
      MAX_ARTIFACT_ISSUES_INPUT: ${{ inputs.max_artifact_issues || '0' }}
      LIVE_ALLOWED_ACTORS_INPUT: ${{ vars.HYBRID_LIVE_ALLOWED_ACTORS || 'richducat' }}
      TRIGGER_ACTOR: ${{ github.triggering_actor || github.actor }}
      BRANCH_NAME: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Enforce live governance policy
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$BRANCH_NAME" != "main" ]]; then
            echo "live_mode is restricted to main branch dispatches (current branch: $BRANCH_NAME)"
            exit 1
          fi

          if [[ "${USE_FIXTURES_INPUT:-false}" == "true" ]]; then
            echo "live_mode requires use_fixtures=false."
            exit 1
          fi

          allowed_csv="${LIVE_ALLOWED_ACTORS_INPUT}"
          actor="$TRIGGER_ACTOR"

          normalized="$(printf '%s' "$allowed_csv" | tr ',' '\n' | tr -d ' ' | sed '/^$/d')"
          if [[ -z "$normalized" ]]; then
            echo "HYBRID_LIVE_ALLOWED_ACTORS resolved to empty. Configure at least one allowed actor."
            exit 1
          fi

          if ! printf '%s\n' "$normalized" | grep -Fxq "$actor"; then
            echo "actor $actor is not authorized for live_mode. Allowed actors: $normalized"
            exit 1
          fi

      - name: Preflight live connector checks
        shell: bash
        run: |
          set -euo pipefail

          if ! command -v gog >/dev/null 2>&1; then
            echo "Missing required connector CLI: gog"
            exit 1
          fi

          read -r from_iso to_iso < <(node -e '
            const now = new Date();
            const from = new Date(now.getTime() - 24 * 60 * 60 * 1000);
            process.stdout.write(`${from.toISOString()} ${now.toISOString()}`);
          ')

          gog gmail messages search "newer_than:7d" --max 1 --account "${ACCOUNT_INPUT}" --json > /dev/null
          gog calendar events primary --from "${from_iso}" --to "${to_iso}" --account "${ACCOUNT_INPUT}" --json > /dev/null

      - name: Build run args
        id: args
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts

          run_date="${DATE_INPUT}"
          if [[ -z "$run_date" ]]; then
            run_date="$(date +%F)"
          fi

          account="${ACCOUNT_INPUT}"
          args=(--account "$account" --date "$run_date" --brief-out "artifacts/meeting-prep-${run_date}.md")

          if [[ "${SKIP_KB_INPUT:-false}" == "true" ]]; then
            args+=(--skip-kb)
          fi

          {
            echo "run_date=$run_date"
            echo "account=$account"
            printf 'args<<EOF\n'
            printf '%q ' "${args[@]}"
            printf '\nEOF\n'
          } >> "$GITHUB_OUTPUT"

      - name: Run daily hybrid pipeline
        shell: bash
        run: |
          set -euo pipefail
          eval "set -- ${{ steps.args.outputs.args }}"
          npm run db:hybrid:daily -- "$@" | tee "artifacts/pipeline-summary-${{ steps.args.outputs.run_date }}.json"

      - name: Run ingestion health threshold gate
        shell: bash
        run: |
          set -euo pipefail
          run_date="${{ steps.args.outputs.run_date }}"

          npm run db:hybrid:health -- \
            --artifact-dir artifacts \
            > "artifacts/ingestion-health-${run_date}.md"

          npm run db:hybrid:health -- \
            --json \
            --artifact-dir artifacts \
            --max-lag-hours "${MAX_LAG_HOURS_INPUT}" \
            --max-seen-drift-hours "${MAX_SEEN_DRIFT_HOURS_INPUT}" \
            --max-artifact-issues "${MAX_ARTIFACT_ISSUES_INPUT}" \
            | tee "artifacts/ingestion-health-${run_date}.json"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hybrid-daily-live-${{ steps.args.outputs.run_date }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 14

      - name: Dispatch health-gate alerts
        if: ${{ failure() }}
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.HYBRID_ALERT_WEBHOOK_URL }}
          ALERT_WEBHOOK_URLS: ${{ secrets.HYBRID_ALERT_WEBHOOK_URLS }}
          ALERT_ESCALATION_WEBHOOK_URL: ${{ secrets.HYBRID_ALERT_ESCALATION_WEBHOOK_URL }}
          ALERT_ESCALATION_WEBHOOK_URLS: ${{ secrets.HYBRID_ALERT_ESCALATION_WEBHOOK_URLS }}
          ALERT_ESCALATION_WINDOWS_ET: ${{ vars.HYBRID_ALERT_ESCALATION_WINDOWS_ET || 'always' }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
          BRANCH_REF: ${{ github.ref_name }}
          RUN_DATE: ${{ steps.args.outputs.run_date }}
          RUN_MODE: live
          ARTIFACT_LABEL: hybrid-daily-live-${{ steps.args.outputs.run_date }}
          MAX_LAG_HOURS: ${{ env.MAX_LAG_HOURS_INPUT }}
          MAX_SEEN_DRIFT_HOURS: ${{ env.MAX_SEEN_DRIFT_HOURS_INPUT }}
          MAX_ARTIFACT_ISSUES: ${{ env.MAX_ARTIFACT_ISSUES_INPUT }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/ci/dispatch-hybrid-alert.mjs
